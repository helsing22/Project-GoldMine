<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pizza Mary | Menú de mesa</title>
  <link rel="icon" href="./public/favicon.ico" />
  <link rel="stylesheet" href="./src/css/styles.css" />
</head>
<body>
  <div class="page-wrapper">
    <header class="header">
      <div class="header__brand">
        <img src="./public/logo.png" alt="MarysPizza" class="header__logo" />
        <div class="brand-text">
          <h1>Pizza Mary</h1>
          <p class="muted">Menú de mesa · Cienfuegos</p>
        </div>
      </div>
    </header>

    <nav class="sidebar" id="sidebar-categories" aria-label="Categorías"></nav>

    <main class="layout" id="main-layout">
      <section class="notice" role="note">
        <h2>Debes saber que...</h2>
        <p>10% adicional en salón. Feriados: 24, 31 dic y 1 ene.</p>
      </section>

      <div id="menu-sections" class="menu-sections" aria-live="polite"></div>
    </main>

    <!-- Carrito flotante -->
    <button id="cart-button" class="cart-button" aria-label="Abrir carrito">🛒 <span id="cart-count">0</span></button>

    <!-- Modal carrito -->
    <div id="cart-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="cart-title">
      <div class="modal__backdrop" data-close="true"></div>
      <div class="modal__panel">
        <header class="modal__header">
          <h3 id="cart-title">Tu pedido</h3>
          <button id="close-cart" class="btn-icon" aria-label="Cerrar carrito">✕</button>
        </header>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-summary">
          <p>Total: <strong id="cart-total">0 CUP</strong></p>
        </div>
        <div class="checkout-actions">
          <button id="checkout-buy" class="btn btn--primary">Comprar</button>
        </div>
      </div>
    </div>

    <!-- Modal métodos de pago -->
    <div id="payment-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="payment-title">
      <div class="modal__backdrop" data-close="true"></div>
      <div class="modal__panel">
        <header class="modal__header">
          <h3 id="payment-title">Selecciona método de pago</h3>
          <button id="close-payment" class="btn-icon" aria-label="Cerrar">✕</button>
        </header>
        <div class="payment-options">
          <button class="btn-pay" data-method="zelle">Zelle</button>
          <button class="btn-pay" data-method="paypal">PayPal</button>
          <button class="btn-pay" data-method="visa">Visa</button>
          <button class="btn-pay" data-method="transfermovil">Transfermóvil</button>
        </div>
        <p class="muted small">El monto se copió automáticamente al portapapeles.</p>
      </div>
    </div>

    <!-- Modal QR Transfermóvil -->
    <div id="qr-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="qr-title">
      <div class="modal__backdrop" data-close="true"></div>
      <div class="modal__panel">
        <header class="modal__header">
          <h3 id="qr-title">Transfermóvil</h3>
          <button id="close-qr" class="btn-icon" aria-label="Cerrar">✕</button>
        </header>
        <div class="qr-content">
          <p>Escanea el QR para pagar:</p>
          <img id="qr-image" src="" alt="QR Transfermóvil" class="qr-image">
          <p id="qr-note" class="muted small"></p>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p class="muted">© <span id="year"></span>Pizza Mary</p>
    </footer>
  </div>

  <script src="./src/data/menu.js"></script>
  <script src="./src/data/shifts.json" type="application/json"></script>
  <script src="./src/js/app.js"></script>
</body>
</html>
